<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Top half: red -->
  <path d="M10 50 A40 40 0 0 1 90 50 Z" fill="#EE1515"/>
  <!-- Bottom half: white -->
  <path d="M10 50 A40 40 0 0 0 90 50 Z" fill="white"/>
  <!-- Outer circle border -->
  <circle cx="50" cy="50" r="40" stroke="#1a1a2e" stroke-width="4" fill="none"/>
  <!-- Center divider line -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1a1a2e" stroke-width="4"/>
  <!-- Outer center ring -->
  <circle cx="50" cy="50" r="12" fill="#1a1a2e"/>
  <!-- Inner center ring white -->
  <circle cx="50" cy="50" r="7" fill="white"/>
  <!-- Inner center dot -->
  <circle cx="50" cy="50" r="3" fill="#1a1a2e"/>
</svg>
