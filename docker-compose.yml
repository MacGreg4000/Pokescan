version: "3.9"

services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4444:3000"
    environment:
      - POKEMONTCG_API_KEY=${POKEMONTCG_API_KEY:-}
      - OLLAMA_URL=http://192.168.0.77:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-qwen3-vl:8b}
      - DATABASE_PATH=/data/pokescan.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-pokescan2026}
      - ADMIN_SESSION_TOKEN=${ADMIN_SESSION_TOKEN}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  # Backup SQLite automatique toutes les 24h
  # Les fichiers .db sont stockés dans ./backups/ sur l'hôte
  backup:
    image: alpine:latest
    volumes:
      - sqlite_data:/data:ro
      - ./backups:/backups
    command: >
      sh -c "
        apk add --no-cache sqlite &&
        mkdir -p /backups &&
        echo 'Service backup démarré — sauvegarde toutes les 24h' &&
        while true; do
          DEST=/backups/pokescan_$$(date +%Y%m%d_%H%M%S).db &&
          sqlite3 /data/pokescan.db \".backup $$DEST\" &&
          echo \"Backup OK: $$DEST\" || echo 'Backup skipped (DB pas encore créée)' ;
          sleep 86400;
        done
      "
    restart: unless-stopped

volumes:
  sqlite_data:
